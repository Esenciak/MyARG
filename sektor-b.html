                window.location.href = "brama.html";

                alert("ODZYSKANO LOG: \nNAZWA: sys-dump-445.html \nZAWARTOŚĆ: POWAŻNIE USZKODZONE");
            } else if (wpisanaKomenda === "liminalny") {
               
                window.location.href = "pustka.html";
            } else {
                alert("Nieznana komenda.");
            }
        }
