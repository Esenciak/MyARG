<!doctype html>
<html lang="en-us">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<title>Unity Web Player | Weteran_VerticalSlice</title>

		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				background-color: #000000;
			}
			#unity-canvas {
				width: 100vw !important;
				height: 100vh !important;
				display: block;
			}
		</style>
	</head>
	<body style="text-align: center; padding: 0; border: 0; margin: 0">
		<canvas
			id="unity-canvas"
			width="960"
			height="600"
			tabindex="-1"
			style="width: 960px; height: 600px; background: #231f20"></canvas>

		<script>
			function OnUnityEvent(wynik) {
				if (wynik === "Zlapany") {
					// Weteran nas dotknął
					alert("ZŁAPAŁ CIĘ. PĘTLA ZRESETOWANA.");
					window.location.href = "../pustka.html";
				} else if (wynik === "Wygrana") {
					// Gracz dobiegł do wyjścia
					window.location.href = "../zwyciestwo.html";
				}
			}
		</script>
		<script src="PaczkaWebGL/MyARG.loader.js"></script>
		<script>
			if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
				// Mobile device style: fill the whole browser client area with the game canvas:
				var meta = document.createElement("meta");
				meta.name = "viewport";
				meta.content =
					"width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
				document.getElementsByTagName("head")[0].appendChild(meta);

				var canvas = document.querySelector("#unity-canvas");
				canvas.style.width = "100%";
				canvas.style.height = "100%";
				canvas.style.position = "fixed";

				document.body.style.textAlign = "left";
			}

			createUnityInstance(document.querySelector("#unity-canvas"), {
				arguments: [],
				dataUrl: "PaczkaWebGL/MyARG.data",
				frameworkUrl: "PaczkaWebGL/MyARG.framework.js",
				codeUrl: "PaczkaWebGL/MyARG.wasm",
				streamingAssetsUrl: "StreamingAssets",
				companyName: "Karol_Jablonski_Game",
				productName: "Weteran_VerticalSlice",
				productVersion: "0.1.0",
				// matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
				// devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
			})
				.then((unityInstance) => {})
				.catch((message) => {
					alert(message);
				});
		</script>
	</body>
</html>
